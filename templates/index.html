<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PDF Odia Extractor</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; }
        form { margin-bottom: 20px; }
        input[type="file"] { margin: 10px 0; }
        #results { margin-top: 20px; border: 1px solid #ccc; padding: 10px; display: none; }
    </style>
</head>
<body>
    <h1>PDF Odia Extractor</h1>
    <form id="uploadForm">
        <label for="pdfFile">Upload PDF:</label>
        <input type="file" id="pdfFile" name="pdfFile" accept="application/pdf" required>
        <button type="submit">Extract Odia Text</button>
    </form>
    <div id="results">
        <h2>Extracted Text:</h2>
        <pre id="extractedText"></pre>
    </div>
    <script>
        document.getElementById('uploadForm').addEventListener('submit', function(event) {
            event.preventDefault();
            const pdfFile = document.getElementById('pdfFile').files[0];
            if (pdfFile) {
                // Here you would typically send the file to the server and retrieve the result
                document.getElementById('results').style.display = 'block';
                document.getElementById('extractedText').innerText = 'Sample extracted Odia text would appear here.';
            }
        });
    </script>
</body>
</html>
